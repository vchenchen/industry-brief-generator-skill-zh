industry: chemical
industry_name_zh: 海外化工行业
brand: ChemBiz Daily｜海外化工商业快报
logo_preferred: outputs/brand/chembiz-daily-square-logo.png
candidate_count: 20
final_count: 8
regions:
  - 美国
  - 加拿大
  - 英国
  - 欧盟主要国家
  - 日本
  - 韩国
  - 新加坡
  - 东南亚主要市场
  - 澳大利亚
  - 新西兰
sources:
  - ICIS
  - Chemical & Engineering News / C&EN
  - Chemical Week
  - ChemAnalyst
  - S&P Global Commodity Insights
  - Argus Media
  - Reuters Chemicals
  - Plastics News
  - Chemical Processing
  - Hydrocarbon Processing
source_tiers:
  tier_1:
    - ICIS
    - Chemical & Engineering News / C&EN
    - Chemical Week
    - S&P Global Commodity Insights
    - Argus Media
    - Reuters Chemicals
  tier_2:
    - ChemAnalyst
    - Plastics News
    - Chemical Processing
    - Hydrocarbon Processing
    - PR Newswire - Chemical
    - Business Wire - Chemical
    - Company announcements
  tier_3:
    - Deloitte
    - Cefic
    - Wood Mackenzie
    - Market research summaries
    - Mainstream business media
include_topics:
  - 大宗化学品价格与供需
  - 石化、烯烃、芳烃、聚合物
  - 特种化学品和材料
  - 电池材料和新能源化学品
  - 并购、扩产、关停和装置检修
  - 供应链、贸易政策和关税
  - 安全、环保和监管
  - 循环经济、生物基和低碳化学品
exclude_topics:
  - 与化工产业无直接关系的泛财经新闻
  - 只谈股价且无经营信息的资本市场新闻
  - 单一企业营销稿且无行业影响
  - 普通消费品、医药终端和食品零售新闻
writing_style:
  - 专业
  - 克制
  - 关注供需和价格传导
  - 短句优先
  - 卡片化
scoring:
  scale: 0-5
  weights:
    freshness: 1.3
    industry_impact: 1.6
    business_value: 1.5
    regional_relevance: 1.2
    novelty: 0.9
    actionability: 1.2
    source_quality: 1.3
  priority_rules:
    - 价格、供需、装置、贸易政策和产能变化优先
    - tier_1市场数据和行业媒体优先
    - 纯市场规模报告和企业软文降权
dedupe_keys:
  - company
  - chemical_product
  - plant_or_asset
  - transaction
  - market_region
  - date_window
poster:
  size: 1080x1350
  scale: 2
  cover_title_max_chars: 20
  quick_read_max_chars: 18
  card_title_max_chars: 18
  output_pattern: outputs/chemical/{brand_slug}-poster-{date}@2x.png
  avoid_line_break_terms:
    - 聚丙烯
    - 聚乙烯
    - 聚氯乙烯
    - 电池材料
    - 特种化学品
    - 石化期货
    - 供应链
    - 化学回收
    - 生物基
memory_rules:
  memory_path: outputs/chemical/memory.md
  output_dir: outputs/chemical
  remember:
    - selected_story_ids
    - final_source_links
    - commodity_price_themes
    - rejected_duplicate_topics
    - source_quality_notes
  avoid:
    - raw_search_logs
    - paywalled_claims_without_public_snippet
    - unsupported_price_claims
